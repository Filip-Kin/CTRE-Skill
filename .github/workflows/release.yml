name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build .skill file
        run: python scripts/package_skill.py

      - name: Verify archive
        run: python -c "import zipfile; names = zipfile.ZipFile('phoenix6-frc.skill').namelist(); [print(n) for n in names]; assert 'phoenix6-frc/SKILL.md' in names"

      - name: Build tool adapters (Copilot, Cursor)
        run: python scripts/generate_adapters.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phoenix6-frc.skill
            adapters/copilot-instructions.md
            adapters/cursorrules
            adapters/phoenix6-frc.mdc
          generate_release_notes: true
          body: |
            ## phoenix6-frc Phoenix 6 FRC Skill

            Improves AI-generated CTRE Phoenix 6 Java code in any editor.

            ### Claude Code
            Upload `phoenix6-frc.skill` in Claude Code → Settings → Features, or:
            ```bash
            unzip phoenix6-frc.skill -d ~/.claude/skills/   # user-level
            unzip phoenix6-frc.skill -d .claude/skills/     # project-level
            ```

            ### GitHub Copilot
            ```bash
            mkdir -p .github
            curl -L -o .github/copilot-instructions.md \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/copilot-instructions.md
            ```

            ### Cursor
            ```bash
            # Modern rules format (recommended):
            mkdir -p .cursor/rules
            curl -L -o .cursor/rules/phoenix6-frc.mdc \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/phoenix6-frc.mdc

            # Legacy .cursorrules:
            curl -L -o .cursorrules \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cursorrules
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full instructions.
